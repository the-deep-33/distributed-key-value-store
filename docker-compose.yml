services:
  node1:
    build: .
    volumes:
      - ./data/node1:/app/data
    environment:
      CLUSTER: "1=node1:5001,2=node2:5001,3=node3:5001"
    command: ["--id", "1"]
    ports:
      - "5001:5001"

  node2:
    build: .
    volumes:
      - ./data/node2:/app/data
    environment:
      CLUSTER: "1=node1:5001,2=node2:5001,3=node3:5001"
    command: ["--id", "2"]
    ports:
      - "5002:5001"

  node3:
    build: .
    volumes:
      - ./data/node3:/app/data
    environment:
      CLUSTER: "1=node1:5001,2=node2:5001,3=node3:5001"
    command: ["--id", "3"]
    ports:
      - "5003:5001"